<script >

      let d=document.createElement("p");

      document.getElementById("encabezado").appendChild(d);
    
      async function obtenerJSON() {
        const respuesta = await fetch('archivo.json');
        const datos = await respuesta.json();
        console.log(datos);
      
        let a = document.createElement("p");
        a.textContent=datos.autor;
        a.setAttribute("style", "color: orange");
        document.getElementById("encabezado").appendChild(a);
      }

      async function obtenerJSON2() {
        const respuesta = await fetch('http://openlibrary.org/subjects/love.json?published_in=1500-1600');
        const datos = await respuesta.json();
        console.log(datos);
      
        let a = document.createElement("p");
        a.textContent=datos.works[0].title;
        a.setAttribute("style", "color: orange");
        document.getElementById("encabezado").appendChild(a);

      }

      async function obtenerJSON3() {
        const respuesta = await fetch('http://openlibrary.org/subjects/love.json?published_in=1500-1600');
        const datos = await respuesta.json();
        console.log(datos);
      
        let a = document.createElement("p");
        a.textContent=datos.works[1].title;
        a.setAttribute("style", "color: green");
        document.getElementById("encabezado").appendChild(a);

      }


      let b = document.getElementById("titulo");
      b.addEventListener("click", obtenerJSON3);

      async function obtenerJSONArtist() {
        const respuesta = await fetch('https://www.theaudiodb.com/api/v1/json/123/search.php?s=maneskin');
        const datos = await respuesta.json();
        console.log(datos);

        let a = document.createElement("p");
        a.textContent=datos.artists[0].strBiography;
        a.setAttribute("style", "color: red");
        document.getElementById("encabezado").appendChild(a);

        let imglink = datos.artists[0].strArtistThumb;
        let i = document.createElement("img");
        i.setAttribute("src", imglink);
        
        document.getElementById("encabezado").appendChild(i);
      }

      document.getElementById("art1").addEventListener("click", obtenerJSONArtist);

      async function obtenerJSONArtist2() {
